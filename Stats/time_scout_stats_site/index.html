<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time Scout Stats</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--bg:#eef2f7;--card:#fff;--pri:#1e40af;--red:#dc2626;--green:#15803d;--dark:#111827;--muted:#64748b;--line:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--dark)}
header{position:sticky;top:0;z-index:9;background:#0f172a;color:white;padding:12px 16px;box-shadow:0 2px 8px #0003} header h1{margin:0;font-size:20px} header small{color:#cbd5e1}
.container{max-width:1100px;margin:0 auto;padding:14px}.card{background:var(--card);border-radius:14px;padding:14px;margin:12px 0;box-shadow:0 2px 10px #0001;border:1px solid var(--line)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}input,select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px}button{border:0;border-radius:8px;padding:11px 13px;font-weight:700;cursor:pointer;font-size:14px}.blue{background:#2563eb;color:#fff}.green{background:#16a34a;color:#fff}.red{background:#dc2626;color:#fff}.gray{background:#475569;color:#fff}.orange{background:#f59e0b;color:#111}.ghost{background:#e2e8f0;color:#111}.period button.active{outline:3px solid #1113;filter:saturate(1.3)}
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.player{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}.playerHead{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#f8fafc;border-bottom:1px solid var(--line)}.playerName{font-size:18px;font-weight:800}.stats{padding:10px}.stat{display:grid;grid-template-columns:1fr 42px 56px 42px;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9}.stat:last-child{border-bottom:0}.statName{font-size:13px;font-weight:700}.val{text-align:center;font-size:19px;font-weight:900}.minus{background:#fee2e2;color:#991b1b}.plus{background:#dcfce7;color:#166534}.tabs{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid #cbd5e1;padding:7px;text-align:center;font-size:13px}th{background:#e11d48;color:white}.left{text-align:left}.muted{color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.wide{overflow:auto}@media(max-width:760px){.grid,.grid2{grid-template-columns:1fr}.container{padding:8px}.card{padding:12px}.players{grid-template-columns:1fr}.stat{grid-template-columns:1fr 48px 60px 48px}.hideMobile{display:none}}
</style>
</head>
<body>
<header><h1>📊 Time Scout Stats</h1><small>Scout estatístico por atleta — 1º e 2º tempo</small></header>
<div class="container">
<section class="card">
<h2>Dados da partida</h2>
<div class="grid">
<input id="team" placeholder="Nome do time">
<input id="opp" placeholder="Adversário">
<input id="date" type="date">
<input id="comp" placeholder="Competição / Rodada">
<input id="gf" type="number" placeholder="Gols feitos">
<input id="ga" type="number" placeholder="Gols sofridos">
</div>
<div style="margin-top:10px" class="period actions">
<b>Tempo atual:</b><button id="p1" class="orange active" onclick="setPeriod(1)">1º tempo</button><button id="p2" class="blue" onclick="setPeriod(2)">2º tempo</button><span class="muted">O relatório soma 1º + 2º tempo.</span>
</div>
<div style="margin-top:10px" class="actions"><button class="green" onclick="finishGame()">Salvar partida</button><button class="gray" onclick="newGameKeepRoster()">Nova partida mantendo elenco</button><button class="red" onclick="resetAll()">Apagar tudo</button></div>
</section>
<section class="card" id="rosterCard">
<h2>Gerenciar atletas</h2>
<div class="grid2"><input id="athleteName" placeholder="Nome do atleta"><button class="blue" onclick="addAthlete()">Adicionar atleta</button></div>
<p class="muted">Cadastre uma vez. O elenco fica salvo neste aparelho/navegador.</p>
</section>
<section class="card"><div class="actions"><button class="ghost" onclick="toggleRoster()">Gerenciar atletas</button><button class="blue" onclick="renderReport()">Atualizar relatório</button><button class="green" onclick="exportCsv()">Exportar CSV/Excel</button><button class="orange" onclick="exportHtmlExcel()">Exportar Excel bonito</button></div></section>
<section class="players" id="players"></section>
<section class="card"><h2>Histórico de partidas</h2><div id="history" class="muted">Nenhuma partida salva ainda.</div></section>
<section class="card wide"><h2>Relatório final</h2><div id="report"></div></section>
</div>
<script>
const KEY='timeScoutStatsV1';
const STAT_DEFS=[
 ['noGol','No gol'],['fora','Fora'],['gols','Gols'],['assist','Assistências'],['desarmes','Desarmes'],['intercep','Intercep. passes'],['bloq','Bloq. chutes'],['passeErrado','Passe errado'],['defGoleiro','Defesas goleiro'],['faltaCometida','Falta cometida'],['faltaSofrida','Falta sofrida'],['cartAmarelo','Cartão amarelo'],['cartVermelho','Cartão vermelho'],['golsFeitos','Partic. gols feitos'],['golsSofridos','Partic. gols sofridos']
];
let state={period:1, match:{team:'',opp:'',date:new Date().toISOString().slice(0,10),comp:'',gf:'',ga:''}, athletes:[], history:[]};
function blankStats(){let o={1:{},2:{}}; for(const p of [1,2]) for(const [k] of STAT_DEFS)o[p][k]=0; return o}
function save(){state.match={team:team.value,opp:opp.value,date:date.value,comp:comp.value,gf:gf.value,ga:ga.value}; localStorage.setItem(KEY,JSON.stringify(state))}
function load(){try{const s=JSON.parse(localStorage.getItem(KEY)); if(s) state=s}catch(e){}; if(!state.match.date)state.match.date=new Date().toISOString().slice(0,10); for(const a of state.athletes){if(!a.stats)a.stats=blankStats(); for(const p of [1,2]) for(const [k] of STAT_DEFS) if(a.stats[p][k]==null)a.stats[p][k]=0}}
function bind(){for(const id of ['team','opp','date','comp','gf','ga']) window[id].oninput=save}
function fill(){team.value=state.match.team||'';opp.value=state.match.opp||'';date.value=state.match.date||new Date().toISOString().slice(0,10);comp.value=state.match.comp||'';gf.value=state.match.gf||'';ga.value=state.match.ga||''}
function setPeriod(p){state.period=p;p1.classList.toggle('active',p==1);p2.classList.toggle('active',p==2);save();renderPlayers()}
function addAthlete(){const name=athleteName.value.trim(); if(!name)return; state.athletes.push({id:Date.now()+Math.random(),name,stats:blankStats()}); athleteName.value=''; save(); renderPlayers(); renderReport()}
function removeAthlete(id){if(confirm('Remover atleta?')){state.athletes=state.athletes.filter(a=>a.id!==id);save();renderPlayers();renderReport()}}
function inc(id,key,delta){const a=state.athletes.find(x=>x.id===id); if(!a)return; const p=state.period; a.stats[p][key]=Math.max(0,(a.stats[p][key]||0)+delta); save(); renderPlayers(); renderReport()}
function renderPlayers(){players.innerHTML=''; state.athletes.forEach(a=>{const div=document.createElement('div'); div.className='player'; div.innerHTML=`<div class="playerHead"><div class="playerName">${esc(a.name)}</div><button class="red" onclick="removeAthlete(${a.id})">Excluir</button></div><div class="stats">${STAT_DEFS.map(([k,n])=>`<div class="stat"><div class="statName">${n}</div><button class="minus" onclick="inc(${a.id},'${k}',-1)">−</button><div class="val">${a.stats[state.period][k]||0}</div><button class="plus" onclick="inc(${a.id},'${k}',1)">+</button></div>`).join('')}</div>`; players.appendChild(div)})}
function totals(a){let t={}; for(const [k] of STAT_DEFS)t[k]=(a.stats[1][k]||0)+(a.stats[2][k]||0); return t}
function renderReport(){if(!state.athletes.length){report.innerHTML='<p class="muted">Nenhum atleta cadastrado.</p>';return} let html='<table><thead><tr><th class="left">Atleta</th>'+STAT_DEFS.map(x=>`<th>${x[1]}</th>`).join('')+'</tr></thead><tbody>'; let grand={}; for(const [k] of STAT_DEFS)grand[k]=0; state.athletes.forEach(a=>{const t=totals(a); for(const [k] of STAT_DEFS)grand[k]+=t[k]; html+=`<tr><td class="left"><b>${esc(a.name)}</b></td>`+STAT_DEFS.map(([k])=>`<td>${t[k]}</td>`).join('')+'</tr>'}); html+='<tr><th class="left">TOTAL</th>'+STAT_DEFS.map(([k])=>`<th>${grand[k]}</th>`).join('')+'</tr></tbody></table>'; report.innerHTML=html}
function finishGame(){save(); const snap=JSON.parse(JSON.stringify({match:state.match,athletes:state.athletes,created:new Date().toISOString()})); state.history.unshift(snap); save(); renderHistory(); alert('Partida salva no histórico.')}
function renderHistory(){if(!state.history?.length){history.innerHTML='Nenhuma partida salva ainda.';return} history.innerHTML=state.history.map((h,i)=>`<div class="card"><b>${esc(h.match.team||'Time')} x ${esc(h.match.opp||'Adversário')}</b><br>${h.match.date||''} ${h.match.comp?'- '+esc(h.match.comp):''}<br><button class="blue" onclick="openHistory(${i})">Abrir</button> <button class="red" onclick="deleteHistory(${i})">Apagar</button></div>`).join('')}
function openHistory(i){const h=state.history[i]; state.match=h.match; state.athletes=h.athletes; fill(); save(); renderPlayers(); renderReport(); scrollTo(0,0)}
function deleteHistory(i){if(confirm('Apagar partida do histórico?')){state.history.splice(i,1);save();renderHistory()}}
function newGameKeepRoster(){if(!confirm('Zerar estatísticas e manter elenco?'))return; state.match={team:state.match.team,opp:'',date:new Date().toISOString().slice(0,10),comp:'',gf:'',ga:''}; state.athletes.forEach(a=>a.stats=blankStats()); fill(); save(); renderPlayers(); renderReport()}
function resetAll(){if(confirm('Apagar tudo, incluindo elenco e histórico?')){localStorage.removeItem(KEY); state={period:1,match:{team:'',opp:'',date:new Date().toISOString().slice(0,10),comp:'',gf:'',ga:''},athletes:[],history:[]};fill();renderPlayers();renderReport();renderHistory()}}
function toggleRoster(){rosterCard.classList.toggle('hidden')}
function csvRows(){let rows=[]; rows.push(['Time',state.match.team,'Adversário',state.match.opp,'Data',state.match.date,'Competição',state.match.comp,'Gols feitos',state.match.gf,'Gols sofridos',state.match.ga]); rows.push([]); rows.push(['Atleta',...STAT_DEFS.map(x=>x[1])]); let grand={}; for(const [k] of STAT_DEFS)grand[k]=0; state.athletes.forEach(a=>{const t=totals(a); for(const [k] of STAT_DEFS)grand[k]+=t[k]; rows.push([a.name,...STAT_DEFS.map(([k])=>t[k])])}); rows.push(['TOTAL',...STAT_DEFS.map(([k])=>grand[k])]); return rows}
function exportCsv(){const csv=csvRows().map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(';')).join('\n'); download(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),'time_scout_stats_'+(state.match.date||'jogo')+'.csv')}
function exportHtmlExcel(){let html='<html><head><meta charset="utf-8"></head><body>'+report.innerHTML+'</body></html>'; download(new Blob([html],{type:'application/vnd.ms-excel'}),'time_scout_stats_'+(state.match.date||'jogo')+'.xls')}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
load();fill();bind();setPeriod(state.period||1);renderPlayers();renderReport();renderHistory();
</script>
</body></html>
